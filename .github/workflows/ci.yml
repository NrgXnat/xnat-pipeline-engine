name: CI

# Minimal build check — this repo has no compilation, tests, or maven
# publish. The gradle build assembles the installer tree (copyAll) and the
# source-snapshot zip (buildArchive); running it green is the whole point:
# it proves the wrapper, the parent BOM import, and every managed
# dependency version still resolve. The real deployable is assembled by
# Jenkins with site-specific parameters, so the zip uploaded here is a
# convenience artifact only.

on:
  push:
    branches:
      - master
      - develop
      - 'releases/*'
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build
        run: ./gradlew copyAll buildArchive

      - name: Upload installer zip
        uses: actions/upload-artifact@v4
        with:
          name: xnat-pipeline-zip
          path: build/libs/*.zip
          if-no-files-found: error
